<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="./styles.css">
</head>
<body>
<h1> Calculator</h1>


<div id="display"></div>


<div class="container">
    <div class="row">
        <button id="7">7</button>
        <button id="8">8</button>
        <button id="9">9</button>
        <button id="divider">/</button>
    </div>
    <div class="row">
        <button id="4">4</button>
        <button id="5">5</button>
        <button id="6">6</button>
        <button id="multiplier">x</button>
    </div>
    <div class="row">
        <button id="1">1</button>
        <button id="2">2</button>
        <button id="3">3</button>
        <button id="minus">-</button>
    </div>
    <div class="row">
        <button id="0">0</button>
        <button id="comma">.</button>
        <button id="equal">=</button>
        <button id="plus">+</button>
    </div>
   <button id="clear">clear</button>
</div>












<script>
//get button elements
const one = document.getElementById("1");
const two = document.getElementById("2");
const three = document.getElementById("3");
const four = document.getElementById("4");
const five = document.getElementById("5");
const six = document.getElementById("6");
const seven = document.getElementById("7");
const eight = document.getElementById("8");
const nine = document.getElementById("9");
const zero = document.getElementById("0");
const comma = document.getElementById("comma");
const equal = document.getElementById("equal");
const plus = document.getElementById("plus");
const minus = document.getElementById("minus");
const multiplier = document.getElementById("multiplier");
const divider = document.getElementById("divider");
const display = document.getElementById("display");
const clear = document.getElementById("clear");

//math functions
    const sum = function(a, b) {
        return a+b;
    };

    const subtract = function(a, b) {
        return a-b;
    };

    const multiply = function(a, b) {
        return a*b;
    };

    const divide = function(a, b) {
            if (b === 0) {
                return "Stupid.";
            };
        return a/b;
    };


//variable declaration

let firstNumber = null;
let operator = null;
let currentInput = "";
let waitingForSecondNumber = false;
let resultDisplayed = false;


//assign input

function inputDigit(digit) {
     if (resultDisplayed) {
        currentInput = "";
        firstNumber = null;
        operator = null;
        resultDisplayed = false;
    }

    if (waitingForSecondNumber) {
        currentInput = "";
        waitingForSecondNumber = false;
    }

    currentInput += digit;
    display.textContent = currentInput;
}



one.addEventListener("click", () => inputDigit("1"));
two.addEventListener("click", () => inputDigit("2"));
three.addEventListener("click", () => inputDigit("3"));
four.addEventListener("click", () => inputDigit("4"));
five.addEventListener("click", () => inputDigit("5"));
six.addEventListener("click", () => inputDigit("6"));
seven.addEventListener("click", () => inputDigit("7"));
eight.addEventListener("click", () => inputDigit("8"));
nine.addEventListener("click", () => inputDigit("9"));
zero.addEventListener("click", () => inputDigit("0"));





// choose which operation
function selectOperator(newOperator) {
     if (currentInput === "") {
        return;
    }

    const inputValue = Number(currentInput);

    if (
        firstNumber !== null &&
        operator !== null &&
        !waitingForSecondNumber
    ) {
        const result = operate(firstNumber, operator, inputValue);

        if (typeof result !== "number") {
            display.textContent = result;
            firstNumber = null;
            operator = null;
            currentInput = "";
            waitingForSecondNumber = true;
            return;
        }

        firstNumber = result;
        currentInput = String(result);
        display.textContent = result;
    } else {
        firstNumber = inputValue;
    }

    operator = newOperator;
    waitingForSecondNumber = true;
    resultDisplayed = false;

}




//math operator buttons
plus.addEventListener("click", () => selectOperator("+"));
minus.addEventListener("click", () => selectOperator("-"));
multiplier.addEventListener("click", () => selectOperator("x"));
divider.addEventListener("click", () => selectOperator("/"));


//operator decides further path
const operate = function(a, selectedOperator ,b) {
    switch (selectedOperator) {
        case "+":
            return sum(a, b);
        case "-":
            return subtract(a, b);
        case "x":
            return multiply(a, b);
        case "/":
            return divide(a, b);
        default:
            return b;
    }
}


//calculate result

function calculate() {
    if (
        firstNumber === null ||
        operator === null ||
        currentInput === "" ||
        waitingForSecondNumber
    ) {
        return;
    }

    const secondNumber = Number(currentInput);
    const result = operate(
        firstNumber,
        operator,
        secondNumber
    );

    display.textContent = result;
    resultDisplayed = true;

    if (typeof result === "number") {
        currentInput = String(result);
        firstNumber = result;
    } else {
        currentInput = "";
        firstNumber = null;
    }

    operator = null;
    waitingForSecondNumber = true;
}



//reset calc
function resetCalculator() {
    firstNumber = null;
    operator = null;
    currentInput = "";
    waitingForSecondNumber = false;
    display.textContent = "";
    resultDisplayed = false;
}





// screen changer
comma.addEventListener("click",event=>{ display.textContent += "."})
plus.addEventListener("click",event=>{ display.textContent += " + "})
minus.addEventListener("click",event=>{ display.textContent += " - "})
multiplier.addEventListener("click",event=>{ display.textContent += " x "})
divider.addEventListener("click",event=>{ display.textContent += " / "})
equal.addEventListener("click",calculate)
clear.addEventListener("click",resetCalculator)


</script>
</body>
</html>
